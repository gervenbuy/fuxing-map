<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>福興鄉特色農業與景點互動地圖</title>
    <!-- 引入 Tailwind CSS 快速排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 確保地圖維持自然比例，避免手機直向螢幕產生留白跑版 */
        body {
            margin: 0;
            background-color: #fcf8ee; /* 配合地圖底色 */
        }

        /* 互動圖示的基礎設定與過渡動畫 */
        .interactive-icon {
            position: absolute;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Q彈的動畫曲線 */
            cursor: pointer;
            z-index: 10;
        }

        /* 滑鼠懸停時的放大與浮起效果 */
        .interactive-icon:hover {
            transform: scale(1.15) translateY(-5px);
            z-index: 20; /* 懸停時移到最上層 */
        }

        /* 增加懸停時的圖片陰影加深效果 */
        .interactive-icon:hover img {
            filter: drop-shadow(0 10px 8px rgba(0, 0, 0, 0.2));
        }

        /* Tooltip 提示框樣式 */
        .tooltip {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(0, 0, 0, 0.75);
            color: white;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 14px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease-in-out;
        }

        /* 滑鼠懸停時顯示 Tooltip */
        .interactive-icon:hover .tooltip {
            opacity: 1;
        }

        /* 鎖定地圖容器的長寬比例，圖片尚未載入完成時也能立即保留正確高度，避免空白跳動 */
        #map-container {
            aspect-ratio: 1535 / 1024;
        }

        /* 預留底部選單列的空間，避免地圖內容被遮住 */
        .page-bottom-spacer {
            height: 92px;
        }

        /* 底部固定選單列 */
        .bottom-tab-bar {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 50;
            background: linear-gradient(to bottom, #fffdf8, #fbf3e2);
            border-top: 1px solid #e6d9b8;
            box-shadow: 0 -6px 16px rgba(120, 96, 40, 0.12);
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
        }

        /* 橫向捲動列表 */
        .bottom-tab-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 0 14px;
            scroll-snap-type: x proximity;
            scrollbar-width: none;
        }
        .bottom-tab-scroll::-webkit-scrollbar {
            display: none;
        }

        /* 單一選單卡片 */
        .tab-card {
            flex: 0 0 auto;
            scroll-snap-align: start;
            width: 84px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            text-decoration: none;
            padding: 8px 6px;
            border-radius: 16px;
            background-color: #ffffff;
            border: 1px solid #ecdfc0;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }
        .tab-card:hover,
        .tab-card:active {
            transform: translateY(-3px);
            box-shadow: 0 6px 14px rgba(120, 96, 40, 0.18);
            background-color: #fffaf0;
        }
        .tab-card img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            margin-bottom: 4px;
        }
        .tab-card .tab-name {
            font-size: 12px;
            font-weight: 700;
            color: #5b4530;
            line-height: 1.3;
            white-space: nowrap;
        }
        .tab-card .tab-desc {
            font-size: 10px;
            color: #9c8a6a;
            line-height: 1.3;
            white-space: nowrap;
        }
    </style>
</head>
